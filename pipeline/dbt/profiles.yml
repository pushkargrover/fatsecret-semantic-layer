# One dbt codebase, two targets. DuckDB is the default (free, local, CI); Snowflake
# is the same models against the resume-grade warehouse. Run with `--profiles-dir .`.
fatsecret:
  target: duckdb
  outputs:
    duckdb:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'warehouse.duckdb') }}"
      threads: 4

    # Enable by `pip install dbt-snowflake` and setting the SF_* env vars.
    snowflake:
      type: snowflake
      account: "{{ env_var('SF_ACCOUNT', '') }}"
      user: "{{ env_var('SF_USER', '') }}"
      password: "{{ env_var('SF_PASSWORD', '') }}"
      role: "{{ env_var('SF_ROLE', 'TRANSFORMER') }}"
      database: "{{ env_var('SF_DATABASE', 'FATSECRET') }}"
      warehouse: "{{ env_var('SF_WAREHOUSE', 'COMPUTE_WH') }}"
      schema: "{{ env_var('SF_SCHEMA', 'ANALYTICS') }}"
      threads: 4
